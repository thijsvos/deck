name: Bug Report
description: Report a bug in deck
labels: [bug]

body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `deck my-presentation.md`
        2. Press 'p' for presenter mode
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal emulator
      placeholder: e.g. iTerm2, Kitty, Ghostty, Alacritty, Windows Terminal

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15.3, Ubuntu 24.04, Windows 11

  - type: input
    id: version
    attributes:
      label: deck version
      placeholder: e.g. 0.1.0 (run `deck --version`)
