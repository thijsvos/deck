name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: deck-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: deck-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: deck-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: deck-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/deck ${{ matrix.name }}

      - name: Rename binary (windows)
        if: matrix.os == 'windows-latest'
        run: mv target/${{ matrix.target }}/release/deck.exe ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            deck-linux-x86_64
            deck-macos-x86_64
            deck-macos-aarch64
            deck-windows-x86_64.exe
